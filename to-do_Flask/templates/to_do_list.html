<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>To-Do List App</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='to_do_list.css') }}"
    />
  </head>
  <body>
    <div class="container">
      <h1>To-Do List</h1>
      <input type="text" id="taskInput" placeholder="Enter your task" />
      <div class="button-group">
        <button onclick="addTask()">Add Task</button>
        <button onclick="getTasks()">Display Tasks</button>
        <button onclick="deleteAll()">Delete All</button>
        <button onclick="exitApp()">Exit</button>
      </div>
      <ul id="taskList"></ul>
    </div>
    <script src="{{ url_for('static', filename='to_do_list.js') }}"></script>
  </body>
</html>
